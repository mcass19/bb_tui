    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dev-dependencies:
        patterns:
          - "credo"
          - "dialyxir"
          - "ex_doc"
          - "igniter"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
